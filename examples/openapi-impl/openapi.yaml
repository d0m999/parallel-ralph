openapi: 3.0.3
info:
  title: openapi-impl demo
  version: 0.1.0
paths:
  /health:
    get:
      operationId: get_health
      responses:
        "200":
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: {type: string}
  /users/{id}:
    get:
      operationId: get_user
      parameters:
        - in: path
          name: id
          required: true
          schema: {type: string}
      responses:
        "200":
          description: user
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: {type: string}
                  name: {type: string}
